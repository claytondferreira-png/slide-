<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>Apresentação SENAI</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js/dist/theme/black.css">

  <style>
    .center {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100%;
      text-align: center;
      padding: 30px;
    }

    .btn {
      margin-top: 25px;
      padding: 12px 24px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #38bdf8, #6366f1);
      color: white;
      font-weight: 600;
      font-size: 14px;
      box-shadow: 0 10px 30px rgba(56,189,248,0.3);
    }

    .shapes {
      position: absolute;
      bottom: 30px;
      right: 50%;
      transform: translateX(50%);
      width: 320px;
      height: 200px;
    }
  </style>

</head>
<body>

<div class="reveal">
  <div class="slides">

    <!-- SLIDE 1 -->
    <section data-background="#071226">

      <div class="center">

        <span style="color:#38bdf8; font-size:12px; letter-spacing:2px;">
          EVENTO SENAI
        </span>

        <h1 style="
          color:#e2e8f0;
          font-size:2.8rem;
          line-height:1.2;
          margin-top:10px;
        ">
          Feira Tecnológica
        </h1>

        <button class="btn" onclick="Reveal.slide(1)">
          Começar →
        </button>

      </div>

      <!-- FORMAS MAIORES -->
      <div class="shapes">

        <!-- brilho -->
        <div style="
          position:absolute;
          width:250px;
          height:250px;
          background: radial-gradient(circle, rgba(99,102,241,0.4), transparent);
          bottom:0;
          right:35px;
        "></div>

        <!-- laranja -->
        <div style="
          width:140px;
          height:90px;
          background:#fb923c;
          border-radius:80px 80px 0 0;
          position:absolute;
          bottom:0;
          left:0;
        "></div>

        <!-- roxo -->
        <div style="
          width:70px;
          height:140px;
          background:linear-gradient(180deg,#7c3aed,#4f46e5);
          position:absolute;
          bottom:0;
          left:90px;
          transform:rotate(-8deg);
          border-radius:10px;
        "></div>

        <!-- preto -->
        <div style="
          width:50px;
          height:120px;
          background:#020617;
          position:absolute;
          bottom:0;
          left:150px;
          border-radius:10px;
        "></div>

        <!-- amarelo -->
        <div style="
          width:80px;
          height:110px;
          background:#facc15;
          position:absolute;
          bottom:0;
          left:190px;
          border-radius:40px;
        "></div>

      </div>

    </section>

    <!-- SLIDE 2 -->
    <section data-background="#0f172a">

      <div style="padding:40px; text-align:center;">

        <h2 style="color:#38bdf8;">
          Objetivo do Evento
        </h2>

        <p style="color:#e2e8f0;">
          Apresentar experiências práticas e tecnológicas, promovendo a interação
          entre alunos, visitantes e diferentes áreas industriais do SENAI.
        </p>

        <button class="btn" onclick="Reveal.slide(0)">
          ← Voltar
        </button>

      </div>

    </section>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/reveal.js/dist/reveal.js"></script>

<script>
  Reveal.initialize({
    hash: true,
    transition: 'fade',
    backgroundTransition: 'fade',
    speed: 'slow',
    easing: 'ease-in-out'
  });
</script>

</body>
</html>
