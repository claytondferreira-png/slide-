            <!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">

  <title>Apresentação SENAI</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Reveal CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js/dist/theme/black.css">

  <style>
    body {
      margin: 0;
    }
  </style>

</head>
<body>

<div class="reveal">
  <div class="slides">

    <!-- SLIDE 1 (RESPONSIVO) -->
    <section data-background="#0f172a">

      <div style="
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        height: 100%;
        padding: 40px;
      ">

        <!-- TÍTULO -->
        <h1 style="
          color: #e2e8f0;
          font-size: 2.2rem;
          line-height: 1.2;
          margin-bottom: 20px;
        ">
          Feira Tecnológica SENAI
        </h1>

        <!-- SUBTEXTO -->
        <p style="
          color: #94a3b8;
          font-size: 1rem;
          max-width: 300px;
        ">
          Inovação, prática e conexão com o futuro
        </p>

        <!-- BONECOS -->
        <div style="
          position: absolute;
          bottom: 30px;
          right: 20px;
          height: 140px;
          width: 200px;
        ">

          <!-- LARANJA -->
          <div style="
            width: 100px;
            height: 70px;
            background: #fb923c;
            border-radius: 60px 60px 0 0;
            position: absolute;
            bottom: 0;
            left: 0;">
          </div>

          <!-- ROXO -->
          <div style="
            width: 50px;
            height: 100px;
            background: linear-gradient(180deg, #7c3aed, #4f46e5);
            position: absolute;
            bottom: 0;
            left: 60px;
            transform: rotate(-10deg);
            border-radius: 8px;">
          </div>

          <!-- PRETO -->
          <div style="
            width: 35px;
            height: 90px;
            background: #020617;
            position: absolute;
            bottom: 0;
            left: 100px;
            border-radius: 8px;">
          </div>

          <!-- AMARELO -->
          <div style="
            width: 55px;
            height: 80px;
            background: #facc15;
            position: absolute;
            bottom: 0;
            left: 130px;
            border-radius: 30px;">
          </div>

        </div>

      </div>

    </section>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/reveal.js/dist/reveal.js"></script>

<script>
  Reveal.initialize({
    hash: true,
    transition: 'fade',
    backgroundTransition: 'fade',
    speed: 'slow',
    easing: 'ease-in-out'
  });
</script>

</body>
</html>
