                      <!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">

  <title>Apresentação SENAI</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js/dist/theme/black.css">

</head>
<body>

<div class="reveal">
  <div class="slides">

    <!-- SLIDE 1 -->
    <section data-background="#0f172a">

      <div style="
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        height: 100%;
        padding: 40px;
      ">

        <h1 style="color: #e2e8f0; font-size: 2.2rem;">
          Feira Tecnológica SENAI
        </h1>

        <p style="color: #94a3b8; max-width: 300px;">
          Inovação, prática e conexão com o futuro
        </p>

        <!-- BOTÃO -->
        <button onclick="Reveal.next()" style="
          margin-top: 30px;
          padding: 12px 20px;
          border: none;
          border-radius: 10px;
          background: #38bdf8;
          color: #0f172a;
          font-weight: bold;
          font-size: 14px;
        ">
          Próximo →
        </button>

        <!-- BONECOS -->
        <div style="
          position: absolute;
          bottom: 30px;
          right: 20px;
          height: 140px;
          width: 200px;
        ">

          <div style="width: 100px;height: 70px;background: #fb923c;border-radius: 60px 60px 0 0;position: absolute;bottom: 0;"></div>

          <div style="width: 50px;height: 100px;background: linear-gradient(180deg, #7c3aed, #4f46e5);position: absolute;bottom: 0;left: 60px;transform: rotate(-10deg);border-radius: 8px;"></div>

          <div style="width: 35px;height: 90px;background: #020617;position: absolute;bottom: 0;left: 100px;border-radius: 8px;"></div>

          <div style="width: 55px;height: 80px;background: #facc15;position: absolute;bottom: 0;left: 130px;border-radius: 30px;"></div>

        </div>

      </div>

    </section>

    <!-- SLIDE 2 -->
    <section data-background="#0f172a">

      <div style="padding: 40px;">
        <h2 style="color: #38bdf8;">Objetivo do Evento</h2>

        <p style="color: #e2e8f0;">
          Apresentar experiências práticas e tecnológicas, promovendo a interação
          entre alunos, visitantes e áreas industriais.
        </p>
      </div>

    </section>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/reveal.js/dist/reveal.js"></script>

<script>
  Reveal.initialize({
    hash: true,
    transition: 'fade',
    backgroundTransition: 'fade',
    speed: 'slow',
    easing: 'ease-in-out'
  });
</script>

</body>
</html>
