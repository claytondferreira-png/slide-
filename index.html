<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>Apresentação SENAI</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Reveal CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js/dist/theme/black.css">
</head>
<body>

<div class="reveal">
  <div class="slides">

    <!-- SLIDE 1 -->
    <section data-background="#0b1120">

      <div style="
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        height: 100%;
        padding: 40px;
      ">

        <!-- topo -->
        <span style="
          color: #38bdf8;
          font-size: 12px;
          letter-spacing: 2px;
          text-transform: uppercase;
        ">
          Evento SENAI
        </span>

        <!-- conteúdo -->
        <div>
          <h1 style="
            color: #e2e8f0;
            font-size: 2.6rem;
            line-height: 1.1;
            margin: 10px 0;
          ">
            Feira<br>Tecnológica
          </h1>

          <p style="
            color: #94a3b8;
            max-width: 320px;
          ">
            Inovação, prática e conexão com o futuro
          </p>

          <!-- BOTÃO -->
          <button onclick="Reveal.slide(1)" style="
            margin-top: 25px;
            padding: 12px 22px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #38bdf8, #6366f1);
            color: white;
            font-weight: 600;
            box-shadow: 0 10px 25px rgba(56,189,248,0.3);
          ">
            Começar →
          </button>
        </div>

        <!-- decoração -->
        <div style="
          position: absolute;
          bottom: 0;
          right: 0;
          width: 260px;
          height: 180px;
        ">

          <div style="
            position: absolute;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(99,102,241,0.4), transparent);
            bottom: 0;
            right: 0;
          "></div>

          <div style="width:120px;height:80px;background:#fb923c;border-radius:80px 80px 0 0;position:absolute;bottom:0;"></div>

          <div style="width:60px;height:120px;background:linear-gradient(180deg,#7c3aed,#4f46e5);position:absolute;bottom:0;left:70px;transform:rotate(-8deg);border-radius:10px;"></div>

          <div style="width:40px;height:100px;background:#020617;position:absolute;bottom:0;left:115px;border-radius:10px;"></div>

          <div style="width:65px;height:95px;background:#facc15;position:absolute;bottom:0;left:150px;border-radius:40px;"></div>

        </div>

      </div>
    </section>

    <!-- SLIDE 2 -->
    <section data-background="#0f172a">
      <div style="padding: 40px;">
        <h2 style="color:#38bdf8;">Objetivo do Evento</h2>

        <p style="color:#e2e8f0;">
          Apresentar experiências práticas e tecnológicas, promovendo a interação entre alunos,
          visitantes e diferentes áreas industriais do SENAI.
        </p>
      </div>
    </section>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/reveal.js/dist/reveal.js"></script>

<script>
  Reveal.initialize({
    hash: true,
    transition: 'fade',
    backgroundTransition: 'fade',
    speed: 'slow',
    easing: 'ease-in-out'
  });
</script>

</body>
</html>
