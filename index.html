        <!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">

  <title>Apresentação SENAI</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Reveal CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js/dist/theme/black.css">

</head>
<body>

<div class="reveal">
  <div class="slides">

    <!-- SLIDE 1 -->
    <section data-background="#f8fafc">

      <div style="display: flex; align-items: center; justify-content: space-between; height: 100%;">

        <!-- TEXTO -->
        <div style="width: 50%;">
          <h1 style="color: #0f172a;">Feira Tecnológica SENAI</h1>
          <p style="color: #475569;">Inovação, prática e conexão com o futuro</p>
        </div>

        <!-- BONECOS -->
        <div style="width: 50%; position: relative; height: 300px;">

          <!-- LARANJA -->
          <div style="
            width: 180px;
            height: 120px;
            background: #fb923c;
            border-radius: 100px 100px 0 0;
            position: absolute;
            bottom: 0;
            left: 0;">
            <div style="display:flex; gap:8px; justify-content:center; margin-top:40px;">
              <div style="width:8px;height:8px;background:black;border-radius:50%;"></div>
              <div style="width:8px;height:8px;background:black;border-radius:50%;"></div>
              <div style="width:8px;height:8px;background:black;border-radius:50%;"></div>
            </div>
          </div>

          <!-- ROXO -->
          <div style="
            width: 90px;
            height: 180px;
            background: linear-gradient(180deg, #7c3aed, #4f46e5);
            position: absolute;
            bottom: 0;
            left: 120px;
            transform: rotate(-10deg);
            border-radius: 10px;">
            <div style="display:flex; justify-content:space-around; margin-top:20px;">
              <div style="width:8px;height:8px;background:black;border-radius:50%;"></div>
              <div style="width:8px;height:8px;background:black;border-radius:50%;"></div>
            </div>
          </div>

          <!-- PRETO -->
          <div style="
            width: 60px;
            height: 150px;
            background: #020617;
            position: absolute;
            bottom: 0;
            left: 190px;
            border-radius: 10px;">
            <div style="display:flex; justify-content:space-around; margin-top:20px;">
              <div style="width:8px;height:8px;background:white;border-radius:50%;"></div>
              <div style="width:8px;height:8px;background:white;border-radius:50%;"></div>
            </div>
          </div>

          <!-- AMARELO -->
          <div style="
            width: 90px;
            height: 140px;
            background: #facc15;
            position: absolute;
            bottom: 0;
            left: 240px;
            border-radius: 50px;">
            <div style="display:flex; justify-content:center; margin-top:20px;">
              <div style="width:20px;height:4px;background:black;"></div>
            </div>
          </div>

        </div>

      </div>

    </section>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/reveal.js/dist/reveal.js"></script>

<script>
  Reveal.initialize({
    hash: true,
    transition: 'fade',
    backgroundTransition: 'fade',
    speed: 'slow',
    easing: 'ease-in-out'
  });
</script>

</body>
</html>
